<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Palindrome Checker</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #fdf6ee;
    --warm-white: #fffaf4;
    --peach: #f4a96a;
    --peach-light: #fce0c8;
    --peach-pale: #fef0e4;
    --amber: #e07b39;
    --amber-deep: #c4622a;
    --text: #3d2b1a;
    --text-soft: #8a6a55;
    --text-muted: #c4a892;
    --shadow: rgba(180, 100, 50, 0.12);
    --shadow-warm: rgba(224, 123, 57, 0.18);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--cream);
    background-image:
      radial-gradient(ellipse at 20% 10%, rgba(244,169,106,0.18) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 90%, rgba(244,169,106,0.12) 0%, transparent 50%);
    min-height: 100vh;
    font-family: 'DM Sans', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }
  .page { width: 100%; max-width: 560px; }

  .header { text-align: center; margin-bottom: 36px; animation: fadeUp 0.7s ease both; }
  .header-eyebrow { font-size: 11px; font-weight: 500; letter-spacing: 0.22em; text-transform: uppercase; color: var(--peach); margin-bottom: 10px; }
  .header h1 { font-family: 'Playfair Display', serif; font-size: clamp(36px, 7vw, 54px); font-weight: 700; color: var(--text); line-height: 1.1; }
  .header h1 em { font-style: italic; color: var(--amber); }
  .header-desc { margin-top: 12px; font-size: 14px; font-weight: 300; color: var(--text-soft); line-height: 1.6; }

  .card {
    background: var(--warm-white);
    border-radius: 28px;
    padding: 40px;
    box-shadow: 0 2px 0 rgba(255,255,255,0.9) inset, 0 8px 32px var(--shadow), 0 2px 8px var(--shadow-warm);
    animation: fadeUp 0.7s 0.1s ease both;
  }

  .input-label { display: block; font-size: 12px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 10px; }
  .input-field {
    width: 100%; padding: 18px 22px; border-radius: 16px; border: 2px solid var(--peach-light);
    background: var(--peach-pale); font-family: 'Playfair Display', serif; font-size: 22px;
    color: var(--text); outline: none; transition: border-color 0.25s, box-shadow 0.25s; caret-color: var(--amber);
  }
  .input-field::placeholder { color: var(--text-muted); font-style: italic; font-size: 18px; }
  .input-field:focus { border-color: var(--peach); background: #fff9f4; box-shadow: 0 0 0 4px rgba(244,169,106,0.15); }

  .options { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 16px; }
  .chip {
    display: flex; align-items: center; gap: 6px; padding: 7px 14px; border-radius: 100px;
    border: 1.5px solid var(--peach-light); background: var(--warm-white); font-size: 12px;
    font-weight: 500; color: var(--text-soft); cursor: pointer; transition: all 0.2s; user-select: none;
  }
  .chip:hover { border-color: var(--peach); color: var(--amber); }
  .chip.active { background: var(--peach-light); border-color: var(--peach); color: var(--amber-deep); }
  .chip .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text-muted); transition: background 0.2s; }
  .chip.active .dot { background: var(--amber); }

  .btn {
    width: 100%; margin-top: 22px; padding: 18px; border-radius: 16px; border: none;
    background: linear-gradient(135deg, var(--peach) 0%, var(--amber) 100%); color: white;
    font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 500; letter-spacing: 0.06em;
    cursor: pointer; box-shadow: 0 4px 16px rgba(224,123,57,0.35), 0 1px 0 rgba(255,255,255,0.2) inset;
    transition: transform 0.15s, box-shadow 0.15s, filter 0.15s; position: relative; overflow: hidden;
  }
  .btn::after { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, transparent 60%); pointer-events: none; }
  .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(224,123,57,0.4); filter: brightness(1.04); }
  .btn:active { transform: translateY(0); }

  .divider { height: 1px; background: linear-gradient(90deg, transparent, var(--peach-light), transparent); margin: 30px 0; }

  .result { display: none; }
  .result.show { display: block; animation: fadeUp 0.4s ease both; }

  .result-badge {
    display: flex; align-items: center; gap: 14px; padding: 20px 24px; border-radius: 18px; margin-bottom: 20px;
  }
  .result-badge.yes { background: linear-gradient(135deg, #edfae8 0%, #d4f0d0 100%); border: 1.5px solid #b8e0b4; }
  .result-badge.no { background: linear-gradient(135deg, #fef0e4 0%, #fde0c8 100%); border: 1.5px solid var(--peach-light); }

  .badge-icon { width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; flex-shrink: 0; }
  .result-badge.yes .badge-icon { background: rgba(100,180,100,0.2); }
  .result-badge.no .badge-icon { background: rgba(244,169,106,0.25); }

  .badge-text-title { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 700; line-height: 1.2; }
  .result-badge.yes .badge-text-title { color: #2d6e2d; }
  .result-badge.no .badge-text-title { color: var(--amber-deep); }
  .badge-text-sub { font-size: 13px; font-weight: 300; color: var(--text-soft); margin-top: 3px; }

  .section-label { font-size: 11px; font-weight: 500; letter-spacing: 0.18em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 12px; }
  .mirror-chars {
    display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; padding: 16px;
    background: var(--peach-pale); border-radius: 14px; min-height: 56px; align-items: center; margin-bottom: 20px;
  }
  .ch {
    width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center;
    font-family: 'Playfair Display', serif; font-size: 16px; font-weight: 700; transition: all 0.3s;
  }
  .ch.match { background: #d4f0d0; color: #2d6e2d; border: 1.5px solid #b8e0b4; }
  .ch.mismatch { background: #fde0c8; color: var(--amber-deep); border: 1.5px solid var(--peach); }
  .ch.pivot { background: var(--peach-light); color: var(--amber-deep); border: 1.5px dashed var(--peach); transform: scale(1.08); }

  .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
  .stat { background: var(--peach-pale); border-radius: 14px; padding: 14px 10px; text-align: center; border: 1px solid var(--peach-light); }
  .stat-num { font-family: 'Playfair Display', serif; font-size: 24px; font-weight: 700; color: var(--amber); }
  .stat-name { font-size: 10px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-muted); margin-top: 4px; }

  .history-items { display: flex; flex-direction: column; gap: 8px; max-height: 160px; overflow-y: auto; padding-right: 4px; }
  .history-items::-webkit-scrollbar { width: 3px; }
  .history-items::-webkit-scrollbar-thumb { background: var(--peach-light); border-radius: 4px; }
  .hist-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 16px; border-radius: 12px; background: var(--peach-pale); border: 1px solid var(--peach-light); gap: 10px; }
  .hist-word { font-family: 'Playfair Display', serif; font-style: italic; color: var(--text); font-size: 15px; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .hist-badge { flex-shrink: 0; font-size: 11px; font-weight: 500; padding: 3px 10px; border-radius: 100px; }
  .hist-badge.yes { background: #d4f0d0; color: #2d6e2d; }
  .hist-badge.no { background: var(--peach-light); color: var(--amber-deep); }
  .empty-hint { text-align: center; font-size: 13px; font-style: italic; color: var(--text-muted); padding: 16px; }

  .deco { position: fixed; border-radius: 50%; pointer-events: none; z-index: 0; animation: float 8s ease-in-out infinite; }
  .deco-1 { width: 280px; height: 280px; top: -80px; right: -80px; background: radial-gradient(circle, rgba(244,169,106,0.12) 0%, transparent 70%); }
  .deco-2 { width: 200px; height: 200px; bottom: -40px; left: -60px; background: radial-gradient(circle, rgba(244,169,106,0.09) 0%, transparent 70%); animation-delay: -4s; }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(18px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-16px); } }
</style>
</head>
<body>
<div class="deco deco-1"></div>
<div class="deco deco-2"></div>

<div class="page">
  <div class="header">
    <div class="header-eyebrow">✦ Word Tool</div>
    <h1>Palindrome<br><em>Checker</em></h1>
    <p class="header-desc">Does it read the same forwards and backwards?<br>Let's find out.</p>
  </div>

  <div class="card">
    <label class="input-label">Your Word or Phrase</label>
    <input class="input-field" type="text" id="wordInput" placeholder="e.g. racecar, level…" autocomplete="off" spellcheck="false" />

    <div class="options">
      <div class="chip active" data-id="ignoreCase" onclick="toggleChip(this)"><div class="dot"></div> Ignore Case</div>
      <div class="chip active" data-id="ignoreSpaces" onclick="toggleChip(this)"><div class="dot"></div> Ignore Spaces</div>
      <div class="chip active" data-id="ignorePunct" onclick="toggleChip(this)"><div class="dot"></div> Ignore Punctuation</div>
    </div>

    <button class="btn" onclick="check()">Check Palindrome ✦</button>

    <div class="result" id="result">
      <div class="divider"></div>

      <div class="result-badge" id="resultBadge">
        <div class="badge-icon" id="badgeIcon"></div>
        <div>
          <div class="badge-text-title" id="verdictTitle"></div>
          <div class="badge-text-sub" id="verdictSub"></div>
        </div>
      </div>

      <div class="section-label">Character Mirror</div>
      <div class="mirror-chars" id="mirrorChars"></div>

      <div class="stats">
        <div class="stat"><div class="stat-num" id="statLen">—</div><div class="stat-name">Length</div></div>
        <div class="stat"><div class="stat-num" id="statScore">—</div><div class="stat-name">Mirror %</div></div>
        <div class="stat"><div class="stat-num" id="statTotal">0</div><div class="stat-name">Checked</div></div>
      </div>

      <div class="section-label">Recent Checks</div>
      <div class="history-items" id="historyItems">
        <div class="empty-hint">Nothing yet — try a word above!</div>
      </div>
    </div>
  </div>
</div>

<script>
  let totalChecked = 0;
  const history = [];

  function toggleChip(el) { el.classList.toggle('active'); }
  function isActive(id) { return document.querySelector('[data-id="' + id + '"]').classList.contains('active'); }

  function normalize(str) {
    let s = str;
    if (isActive('ignoreCase')) s = s.toLowerCase();
    if (isActive('ignoreSpaces')) s = s.replace(/\s/g, '');
    if (isActive('ignorePunct')) s = s.replace(/[^a-zA-Z0-9]/g, '');
    return s;
  }

  function mirrorScore(s) {
    if (!s.length) return 0;
    const half = Math.floor(s.length / 2);
    if (!half) return 100;
    let matches = 0;
    for (let i = 0; i < half; i++) { if (s[i] === s[s.length - 1 - i]) matches++; }
    return Math.round((matches / half) * 100);
  }

  function check() {
    const raw = document.getElementById('wordInput').value.trim();
    if (!raw) return;
    const norm = normalize(raw);
    const rev = norm.split('').reverse().join('');
    const isPalin = norm.length > 0 && norm === rev;
    const score = mirrorScore(norm);
    totalChecked++;

    const badge = document.getElementById('resultBadge');
    badge.className = 'result-badge ' + (isPalin ? 'yes' : 'no');
    document.getElementById('badgeIcon').textContent = isPalin ? '🪞' : '↔️';
    document.getElementById('verdictTitle').textContent = isPalin ? "Yes, it's a palindrome!" : "Not a palindrome";
    document.getElementById('verdictSub').textContent = isPalin
      ? '"' + raw + '" reads the same both ways.'
      : '"' + raw + '" differs when reversed.';

    const mirrorEl = document.getElementById('mirrorChars');
    mirrorEl.innerHTML = '';
    if (norm.length > 0 && norm.length <= 28) {
      const half = Math.floor(norm.length / 2);
      norm.split('').forEach((ch, i) => {
        const div = document.createElement('div');
        div.className = 'ch';
        div.textContent = ch.toUpperCase();
        const isCenter = norm.length % 2 === 1 && i === half;
        if (isCenter) { div.classList.add('pivot'); }
        else if (i < half) { div.classList.add(norm[i] === norm[norm.length - 1 - i] ? 'match' : 'mismatch'); }
        else { div.classList.add(norm[norm.length - 1 - i] === norm[i] ? 'match' : 'mismatch'); }
        mirrorEl.appendChild(div);
      });
    } else if (norm.length > 28) {
      mirrorEl.innerHTML = '<span style="font-size:13px;color:var(--text-muted);font-style:italic">Text too long to visualize</span>';
    }

    document.getElementById('statLen').textContent = norm.length || '—';
    document.getElementById('statScore').textContent = norm.length ? score + '%' : '—';
    document.getElementById('statTotal').textContent = totalChecked;

    history.unshift({ word: raw.length > 18 ? raw.slice(0,18) + '…' : raw, isPalin });
    if (history.length > 5) history.pop();

    const el = document.getElementById('historyItems');
    el.innerHTML = history.map(h => `
      <div class="hist-item">
        <span class="hist-word">${h.word}</span>
        <span class="hist-badge ${h.isPalin ? 'yes' : 'no'}">${h.isPalin ? 'Palindrome ✓' : 'Not a match'}</span>
      </div>`).join('');

    const resultEl = document.getElementById('result');
    resultEl.classList.remove('show');
    void resultEl.offsetWidth;
    resultEl.classList.add('show');
  }

  document.getElementById('wordInput').addEventListener('keydown', e => { if (e.key === 'Enter') check(); });
  let liveTimer;
  document.getElementById('wordInput').addEventListener('input', () => { clearTimeout(liveTimer); liveTimer = setTimeout(check, 500); });
</script>
</body>
</html>
